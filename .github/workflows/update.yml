name: Update Live Sports JSON

on:
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Clone Private Repository
        run: |
          git clone https://${{ secrets.GH_PAT }}@github.com/srhady/Sports.git private_repo

      - name: Run Scraper Script
        run: |
          python private_repo/data.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add live_sports_playlist.json
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Manual update Live sports playlist" && git pull --rebase origin main && git push)

      # 🔥 NEW STEP
      - name: Purge jsDelivr cache
        run: |
          curl -X GET "https://purge.jsdelivr.net/gh/srhady/data@main/live_sports_playlist.json"
