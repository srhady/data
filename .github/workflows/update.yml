name: Update Live Sports JSON

# কখন রান করবে তার সেটিং
on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর অটোমেটিক রান করবে (লাইভ ম্যাচের জন্য বেস্ট)
  workflow_dispatch: # 'Run workflow' বাটনে ক্লিক করে ম্যানুয়ালি রান করার জন্য

# ফাইল এডিট করে পুশ করার পারমিশন
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper Script
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # নতুন লাইভ জেসন ফাইলটি অ্যাড করা হচ্ছে
          git add live_sports_playlist.json
          
          # ডাটা পরিবর্তন হলেই কেবল গিটহাবে পুশ করবে, নাহলে এরর এড়াবে
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Live sports playlist [skip ci]"
          git push
