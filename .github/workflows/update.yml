name: Update Live Sports JSON

on:
  workflow_dispatch: # 'Run workflow' বাটনে ক্লিক করে ম্যানুয়ালি রান করার জন্য

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. পাবলিক রিপোজিটরি রেডি করা
      - name: Checkout Public Repository
        uses: actions/checkout@v4

      # ২. প্রাইভেট রিপো (srhady/Sports) থেকে ডাটা ধার করে আনা
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: srhady/Sports
          token: ${{ secrets.GH_PAT }} # গোপন চাবি
          ref: main # আপনার স্ক্রিনশট অনুযায়ী main ব্রাঞ্চ
          path: private_script_folder # ফাইলগুলো এই ফোল্ডারে আসবে

      # ৩. পাইথন সেটআপ করা
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ৪. প্রয়োজনীয় লাইব্রেরি ইনস্টল করা
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ৫. প্রাইভেট ফোল্ডার থেকে সরাসরি data.py রান করা
      - name: Run Scraper Script
        run: |
          echo "📂 প্রাইভেট ফোল্ডারের ভেতরের ফাইলগুলো চেক করা হচ্ছে:"
          ls -la private_script_folder/
          
          # সরাসরি ফাইল রান করা হচ্ছে
          python private_script_folder/data.py

      # ৬. নতুন জেসন ফাইলটি পাবলিক রিপোতে সেভ ও পুশ করা
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add live_sports_playlist.json
          
          # ডাটা পরিবর্তন হলেই কেবল গিটহাবে পুশ করবে
          git diff --quiet && git diff --staged --quiet || git commit -m "Manual update Live sports playlist [skip ci]"
          git push
